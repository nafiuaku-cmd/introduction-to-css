<!DOCTYPE html>
<html>
<head>
<style>
    div{
        right: 30px;
        border:3px solid blue;
    }
    div.absolute{
        position:absolute;
        left:50px;
        border:3ox solid black;
    }
    div.relative{
        position:relative;
        left: 100px;
        border: 3px solid green;
    }
    div.fixed {
        position: fixed;
        top:0px;
        right:20px;
        width: 300px;
        border: 3px solid yellowgreen;
    }
    div.sticky {
        position: sticky;
        top:1px;
        left:20px;
        width:100px;
        border:3px solid palevioletred
    }
</style>
</head>
<body>
    <h2>positioning</h2>
    <div>
        div with o position property
    </div>
    <div class="sticky">
        div with sticky position property
    </div>
    <div class="relative">
        this div element has position: relative;
        <div class="absolute">
            absolute class div
        </div>
    </div>
    <div class="fixed">
        div with fixed position propwerty
    </div>
</body>
</html>
