<!DOCTYPE html>
<html>
    <head>
        <style>
            img#flowerright{
                float:right
            }
            img#flowerleft{
                float:left
            }
        </style>
    </head>
    <body>
        <h2>float right</h2>
        <p>in this example the image will float to the right in the paragraph, and the text in the paragraph will wrap around the image.</p>
        <p>
            <img id="flowerright" src="ball.jpg" alt="tree" style="width:100px; height:100px;">
            <img id="flowerleft" src="ball.jpg" alt="tree" style="width:100px; height:100px;">
            this is a dummy content used to understand float property
        </p>
    </body>
</html>
